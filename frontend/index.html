<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JARVIS Assistant</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        background-color: #000;
        color: #fff;
        font-family: 'Inter', sans-serif;
      }
      #canvas-container {
        position: absolute;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: 1;
      }
      #ui-layer {
        position: absolute;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: 2;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        pointer-events: none;
      }
      .top-bar {
        padding: 20px;
        display: flex;
        justify-content: flex-end;
        pointer-events: auto;
      }
      .bottom-bar {
        padding: 40px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
        pointer-events: auto;
        background: linear-gradient(transparent, rgba(0,0,0,0.8));
      }
      #chat-container {
        flex: 1;
        width: 100%;
        max-width: 800px;
        margin: 0 auto;
        padding: 20px;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 15px;
        pointer-events: auto;
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      #chat-container::-webkit-scrollbar {
        display: none;
      }
      .message {
        max-width: 80%;
        padding: 12px 18px;
        border-radius: 20px;
        font-size: 1.1rem;
        line-height: 1.4;
        animation: fadeIn 0.3s ease;
        backdrop-filter: blur(10px);
        word-wrap: break-word;
      }
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .message.user {
        align-self: flex-end;
        background: rgba(43, 138, 255, 0.4);
        border: 1px solid rgba(43, 138, 255, 0.6);
        border-bottom-right-radius: 4px;
      }
      .message.jarvis {
        align-self: flex-start;
        background: rgba(255, 255, 255, 0.15);
        border: 1px solid rgba(255, 255, 255, 0.3);
        border-bottom-left-radius: 4px;
      }
      .message.status {
        align-self: center;
        font-size: 0.9rem;
        color: rgba(255, 255, 255, 0.6);
        background: transparent;
        backdrop-filter: none;
        padding: 4px;
      }
      button {
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.2);
        color: white;
        padding: 12px 24px;
        border-radius: 30px;
        font-size: 1rem;
        cursor: pointer;
        backdrop-filter: blur(10px);
        transition: all 0.3s ease;
      }
      button:hover {
        background: rgba(255, 255, 255, 0.2);
      }
      button.recording {
        background: rgba(255, 50, 50, 0.3);
        border-color: rgba(255, 50, 50, 0.5);
      }
      .input-container {
        display: flex;
        gap: 10px;
        width: 100%;
        max-width: 600px;
        justify-content: center;
      }
      input[type="text"] {
        flex: 1;
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.2);
        color: white;
        padding: 12px 20px;
        border-radius: 30px;
        font-size: 1rem;
        backdrop-filter: blur(10px);
        outline: none;
      }
      input[type="text"]::placeholder {
        color: rgba(255, 255, 255, 0.5);
      }
    </style>
  </head>
  <body>
    <div id="canvas-container"></div>
    <div id="ui-layer">
      <div class="top-bar">
        <button id="settings-btn">Settings</button>
      </div>
      <div id="chat-container"></div>
      <div class="bottom-bar">
        <div class="input-container">
          <input type="text" id="text-input" placeholder="Message Jarvis..." autocomplete="off" />
          <button id="send-btn">Send</button>
          <button id="mic-btn">🎤 Listen</button>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
